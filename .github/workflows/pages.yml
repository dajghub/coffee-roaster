name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois, sans annuler celui en cours :
# annuler un déploiement Pages en vol provoque des échecs transitoires
# « Deployment failed, try again later » (reco officielle GitHub Pages).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (public/ = tout ce qui est déployé tel quel)
        run: |
          mkdir -p _site
          cp -r public/. _site/
          echo "getcoffeeroaster.com" > _site/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
